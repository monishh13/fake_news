version: '3.8'

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fakenews-redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: fakenews-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: fakenewsdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  # ── ML Service ─────────────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
    container_name: fakenews-ml
    ports:
      - "8000:8000"
    env_file:
      - ./ml-service/.env      # API keys injected from file, not baked into image
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./model_weights:/app/model_weights
    networks:
      - app-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s    # allow model warm-up time

  # ── Spring Boot Gateway ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: fakenews-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=root
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - db
      - ml-service
    networks:
      - app-network
    restart: unless-stopped

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: fakenews-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
