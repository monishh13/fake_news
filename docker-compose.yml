version: '3.8'

services:
  db:
    image: postgres:15
    container_name: fakenews-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: fakenewsdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

  ml-service:
    build: 
      context: ./ml-service
    container_name: fakenews-ml
    ports:
      - "8000:8000"
    volumes:
      - ./model_weights:/app/model_weights
    networks:
      - app-network

  backend:
    build: 
      context: ./backend
    container_name: fakenews-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=root
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - db
      - ml-service
    networks:
      - app-network

  frontend:
    build: 
      context: ./frontend
    container_name: fakenews-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
