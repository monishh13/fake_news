<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AIVera Analysis</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            width: 350px;
            margin: 0;
            padding: 16px;
            background-color: #06080F;
            color: #ffffff;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .logo { width: 24px; height: 24px; background: linear-gradient(135deg, #6c5ce7, #8e44ad); border-radius: 6px; }
        .title { font-weight: bold; font-size: 16px; }
        .content { font-size: 14px; line-height: 1.5; }
        .loader {
            text-align: center; padding: 30px 0; color: #6c5ce7; font-weight: bold; font-size: 14px;
        }
        .result-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .score { font-size: 24px; font-weight: bold; text-align: center; margin: 10px 0; }
        .score.high { color: #34d399; }
        .score.med { color: #fbbf24; }
        .score.low { color: #f43f5e; }
        .claim { font-style: italic; color: rgba(255,255,255,0.8); margin-bottom: 8px; border-left: 2px solid #6c5ce7; padding-left: 8px;}
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .evidence-section { margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
        .evidence-title { font-size: 10px; opacity: 0.6; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .evidence-item { font-size: 11px; line-height: 1.4; color: rgba(255,255,255,0.7); margin-bottom: 8px; padding: 6px; background: rgba(255,255,255,0.02); border-radius: 6px; position: relative; }
        .source-badge { font-size: 8px; font-weight: 800; padding: 1px 4px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }
        .source-wiki { background: #3b82f6; color: white; }
        .source-google { background: #ef4444; color: white; }
        .source-news { background: #f59e0b; color: white; }
        .btn { display: block; width: 100%; padding: 10px; background: #6c5ce7; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: 500;}
        .btn:hover { background: #5a4bcf; }
        .empty-state { text-align: center; color: rgba(255,255,255,0.5); padding: 20px 0;}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"></div>
        <div class="title">AIVera Analysis</div>
    </div>
    <div id="app" class="content">
        <div class="empty-state">Select text on any webpage, right-click, and choose "Analyze with AIVera"</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
